allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  sharp: false
catalogMode: prefer
minimumReleaseAge: 2880 # Security: Wait 2 days (2880 minutes) before installing newly released packages
packages:
  - apps/*
  - packages/*
trustLockfile: true
overrides:
  esbuild: ">=0.28.1" # Security: esbuild RCE (GHSA-gv7w-rqvm-qjhr) + arbitrary file read (GHSA-g7r4-m6w7-qqqr), patched in 0.28.1
  yaml: ">=2.8.3" # Security: yaml stack overflow via deeply nested collections (GHSA-48c2-rrv3-qjmp), patched in 2.8.3
catalog:
  "@astrojs/check": ^0.9.9
  "@astrojs/compiler-rs": ^0.2.2
  "@astrojs/markdoc": ^2.0.0
  "@astrojs/netlify": ^8.0.0
  "@astrojs/react": ^6.0.0
  "@astrojs/rss": ^4.0.18
  "@astrojs/sitemap": ^3.7.3
  "@biomejs/biome": 2.3.0
  "@keystatic/astro": ^5.1.0
  "@keystatic/core": ^0.5.50
  "@manypkg/cli": ^0.25.1
  "@sindresorhus/slugify": ^3.0.0
  "@tailwindcss/typography": ^0.5.20
  "@tailwindcss/vite": ^4.3.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@unpic/react": ^1.0.2
  astro: ^7.0.0
  clsx: ^2.1.1
  prettier: ^3.8.3
  prettier-plugin-astro: ^0.14.1
  prettier-plugin-tailwindcss: ^0.8.0
  react: ^19.2.7
  react-compiler-runtime: 19.0.0-beta-ebf51a3-20250411
  react-dom: ^19.2.7
  shiki: ^4.2.0
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.0
  tiny-invariant: ^1.3.3
  turbo: ^2.9.18
  typescript: ^6.0.3
  zod: ^4.4.3
